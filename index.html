<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secret Calculator</title>

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#222;
    font-family:Arial,sans-serif;
}

.calculator{
    width:300px;
    background:#333;
    padding:20px;
    border-radius:20px;
}

#display{
    width:100%;
    height:70px;
    font-size:28px;
    text-align:right;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    padding-right:10px;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    font-size:22px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.equal{
    background:#ff9500;
    color:white;
}
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button onclick="add('+')">+</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>
        <button onclick="add('-')">-</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>
        <button onclick="add('*')">*</button>

        <button onclick="clearDisplay()">C</button>
        <button onclick="add('0')">0</button>
        <button class="equal" onclick="calculate()">=</button>
        <button onclick="add('/')">/</button>
    </div>
</div>

<script>
function add(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function calculate(){
    let input = display.value;

    if(input === "2+3+4+2+2+2+10"){
        display.value = "Do you want to be my girlfriend";
        return;
    }

    if(input === "1+4+3"){
        display.value = "I love you";
        return;
    }

    try{
        display.value = eval(input);
    }catch{
        display.value = "Error";
    }
}
</script>

</body>
</html>
